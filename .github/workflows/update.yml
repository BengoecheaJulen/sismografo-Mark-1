name: Actualización diaria Sismógrafo MARK 1

on:
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Descargar código motor
        uses: actions/checkout@v4
      
      - name: 2. Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: 3. Instalar dependencias
        run: pip install yfinance fredapi numpy pandas matplotlib requests openpyxl xlrd
      
      - name: 4. Ejecutar Sismógrafo
        run: python sismografo_vivo.py
      
      - name: 5. Guardar cambios en el motor (Privado)
        run: |
          git config user.name "Sismógrafo Bot"
          git config user.email "bot@sismografo.local"
          git add -A
          FECHA=$(date +%Y-%m-%d)
          git diff --staged --quiet || git commit -m "📊 Actualización motor $FECHA"
          git push
      
      - name: 6. Publicar resultados en la web (Público)
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          # 1. Clonar el repositorio público
          git clone https://x-access-token:${DEPLOY_TOKEN}@github.com/BengoecheaJulen/sismografo-Mark-1.git public_repo
          
          # 2. Limpiar el repo público y trasplantar la web nueva
          rm -rf public_repo/*
          cp -rv docs/* public_repo/ 2>/dev/null || true
          
          # 3. Crear carpeta data y mover el JSONL reconstruido
          mkdir -p public_repo/data
          cp data/registro_diario.jsonl public_repo/data/ 2>/dev/null || true
          
          # 4. Subir cambios al repositorio público
          cd public_repo
          git config user.name "Sismógrafo Bot"
          git config user.email "bot@sismografo.local"
          git add .
          git commit -m "🚀 MARK 1: Actualización web $(date +'%Y-%m-%d')" || echo "Sin cambios"
          git push origin main